html, body { height: 100%; }

/* ── PANTALLAS ── */
.pantalla { display:none; padding:20px; max-width:480px; margin:0 auto; }
.pantalla.activa { display:block; }

h1{
  font-family: Impact, 'Arial Narrow', Arial, sans-serif;
  font-size: 3rem;
  letter-spacing: 4px;
  color: white;
  -webkit-text-stroke: 1.5px rgba(255,255,255,0.8);
  text-shadow: 0 0 20px rgba(255,255,255,0.3), 0 4px 8px rgba(0,0,0,0.6);
  position: relative;
  display: inline-block;
  margin-bottom: 5px;
  animation: fadeUp 0.6s ease both;
}
h1::after {
  content: attr(data-text);
  position: absolute;
  left: 0; top: 100%;
  color: white;
  -webkit-text-stroke: 1px rgba(255,255,255,0.4);
  transform: scaleY(-0.3) translateY(-10px);
  opacity: 0.2;
  filter: blur(1px);
  display: block;
  width: 100%;
  pointer-events: none;
}

/* ── CARDS ── */
.card{
  background: rgba(17,24,39,0.75);
  backdrop-filter: blur(6px);
  padding:20px;
  border-radius:14px;
  margin-bottom:15px;
  border: 1px solid rgba(255,255,255,0.08);
  animation: fadeUp 0.6s ease forwards;
  opacity:0;
}
.card:nth-child(1){ animation-delay:0.1s; }
.card:nth-child(2){ animation-delay:0.25s; }
.card:nth-child(3){ animation-delay:0.4s; }

/* ── INPUTS ── */
input,button{ padding:10px; margin:5px 0; border-radius:10px; border:none; }
input{ width:100%; background:#0f172a; color:white; outline:none; border:1px solid #1f2937; }
input[type="date"], input[type="time"]{ color-scheme: dark; }

/* ── BOTONES ── */
button{ background:#22c55e; color:black; font-weight:bold; cursor:pointer; transition:0.2s; width:100%; margin-top:8px; }
button:hover{ transform:scale(1.03); background:#16a34a; }
.btn-secundario{ background:#1f2937; color:white; }
.btn-secundario:hover{ background:#374151; }
.btn-peligro{ background:#dc2626; color:white; }
.btn-peligro:hover{ background:#b91c1c; }

/* ── LINK ── */
.link{ color:#a7f3d0; text-decoration:underline; cursor:pointer; font-size:0.9rem; display:block; text-align:center; margin-top:10px; }

/* ── PARTIDOS ── */
.partido{ background:#0f172a; padding:12px; border-radius:10px; margin-top:8px; border-left:4px solid #22c55e; line-height:1.7; }

/* ── USUARIO BADGE ── */
.badge{ background:#0f172a; border:1px solid #1f2937; padding:8px 14px; border-radius:20px; font-size:0.85rem; display:inline-flex; align-items:center; gap:8px; margin-bottom:12px; }
.badge-dot{ width:8px; height:8px; background:#22c55e; border-radius:50%; display:inline-block; }

/* ── LABEL ── */
label{ font-size:0.85rem; color:#a7f3d0; margin-top:8px; display:block; }

/* ── ANIMACION ── */
@keyframes fadeUp {
  from{ opacity:0; transform:translateY(30px); }
  to{ opacity:1; transform:translateY(0); }
}

/* ── BALL DECO ── */
.ball{ position:fixed; width:140px; height:140px; background:white; border-radius:50%; top:75%; left:8%; opacity:0.05; z-index:-1; }

/* ── MODAL ── */
.modal{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:999; justify-content:center; align-items:center; }
.modal.activo{ display:flex; }
.modal-box{ background:#111827; border-radius:16px; padding:24px; margin:20px; border:1px solid rgba(255,255,255,0.1); text-align:center; max-width:300px; width:100%; }
.modal-btns{ display:flex; gap:10px; justify-content:center; margin-top:16px; }
.modal-btns button{ width:auto; }

/* ── DIVIDER ── */
.divider{ display:flex; align-items:center; gap:10px; margin:12px 0; color:#6b7280; font-size:0.85rem; }
.divider::before,.divider::after{ content:""; flex:1; height:1px; background:#1f2937; }
</style>
</head>
<body>
<div class="ball"></div>

<!--  PANTALLA: LOGIN                  -->

<div id="pantallaLogin" class="pantalla activa">

  <div class="card">

<div id="pantallaRegistro" class="pantalla">

  <div class="card">
    <h2>📝 Crear cuenta</h2>
    <input id="regNombre" placeholder="Nombre de usuario">
    <input id="regEmail" type="email" placeholder="Email">
    <input id="regPass" type="password" placeholder="Contraseña (mín. 6 caracteres)">
    <input id="regPass2" type="password" placeholder="Repetir contraseña">
    <p id="regError" style="color:#f87171; font-size:0.85rem; min-height:18px;"></p>
    <button onclick="registrar()">Crear cuenta</button>

  <div class="badge">
    <span class="badge-dot"></span>
    <span id="badgeNombre">Usuario</span>

  <div class="card">
    <h2>📢 Crear partido</h2>
    <input id="zona" placeholder="Zona o nombre de cancha">
    <label>📅 Día</label>
    <input id="fecha" type="date">
    <label>🕒 Horario</label>
    <input id="hora" type="time">
    <button onclick="crearPartido()">Publicar partido</button>

  <div class="card">
    <h2>⚽ Partidos</h2>

    <div id="lista"></div>
  </div>
</div>

<!--  MODAL: CONFIRMAR ELIMINAR        -->
<!-- ══════════════════════════════════ -->
<div id="modalEliminar" class="modal">
  <div class="modal-box">
    <p style="font-size:1.1rem;">¿Seguro que querés eliminar este partido?</p>
    <div class="modal-btns">
      <button class="btn-secundario" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-peligro" id="btnConfirmarEliminar">Eliminar</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════
//  ESTADO
// ══════════════════════════════════
let usuarioActual = null; // { nombre, email }

// ══════════════════════════════════
//  PALABRAS BLOQUEADAS
// ══════════════════════════════════
const PALABRAS_BLOQUEADAS = [
  "puto","puta","concha","chota","pelotudo","pelotuda","hijo de puta",
  "hdp","forro","forra","cagon","cagona","culo","pito",
  "mierda","pija","teta","orto","mogolico","idiota","estupido",
  "estupida","imbecil","tarado","tarada",
  "falopa","droga","cocaina","cocaine","marihuana","porro","merca",
  "crack","heroina","pastilla","faso","transa","dealer"
];

function contieneGroserias(texto){
  const lower = texto.toLowerCase();
  return PALABRAS_BLOQUEADAS.some(p => lower.includes(p));
}

// ══════════════════════════════════
//  NAVEGACION
// ══════════════════════════════════
function mostrarPantalla(id){
  document.querySelectorAll(".pantalla").forEach(p => p.classList.remove("activa"));
  document.getElementById(id).classList.add("activa");
}

// ══════════════════════════════════
//  USUARIOS (simulado con localStorage)
//  ⚠️ REEMPLAZAR con Firebase Auth
// ══════════════════════════════════
function getUsuarios(){
  return JSON.parse(localStorage.getItem("usuarios_db") || "{}");
}

function registrar(){
  const nombre = document.getElementById("regNombre").value.trim();
  const email = document.getElementById("regEmail").value.trim().toLowerCase();
  const pass = document.getElementById("regPass").value;
  const pass2 = document.getElementById("regPass2").value;
  const err = document.getElementById("regError");

  if(!nombre || !email || !pass){ err.textContent = "Completá todos los campos."; return; }
  if(contieneGroserias(nombre)){ err.textContent = "⚠️ Usá un nombre apropiado."; return; }
  if(pass.length < 6){ err.textContent = "La contraseña debe tener al menos 6 caracteres."; return; }
  if(pass !== pass2){ err.textContent = "Las contraseñas no coinciden."; return; }

  const usuarios = getUsuarios();
  if(usuarios[email]){ err.textContent = "Ya existe una cuenta con ese email."; return; }

  usuarios[email] = { nombre, email, pass };
  localStorage.setItem("usuarios_db", JSON.stringify(usuarios));

  err.textContent = "";
  alert("✅ Cuenta creada. Ya podés iniciar sesión.");
  mostrarPantalla("pantallaLogin");
}

function login(){
  const email = document.getElementById("loginEmail").value.trim().toLowerCase();
  const pass = document.getElementById("loginPass").value;
  const err = document.getElementById("loginError");

  // ⚠️ REEMPLAZAR con Firebase Auth signInWithEmailAndPassword
  const usuarios = getUsuarios();
  const user = usuarios[email];

  if(!user || user.pass !== pass){ err.textContent = "Email o contraseña incorrectos."; return; }

  err.textContent = "";
  usuarioActual = { nombre: user.nombre, email: user.email };
  localStorage.setItem("sesion", JSON.stringify(usuarioActual));

  document.getElementById("badgeNombre").textContent = usuarioActual.nombre;
  mostrarPantalla("pantallaApp");
  mostrar();
}

function logout(){
  usuarioActual = null;
  localStorage.removeItem("sesion");
  mostrarPantalla("pantallaLogin");
}

// ══════════════════════════════════
//  PARTIDOS
// ══════════════════════════════════
function crearPartido(){
  if(!usuarioActual){ return; }
  const zona = document.getElementById("zona").value.trim();
  const fecha = document.getElementById("fecha").value;
  const hora = document.getElementById("hora").value;

  if(!zona || !fecha || !hora){ alert("⚠️ Completá todos los campos."); return; }
  if(contieneGroserias(zona)){ alert("⚠️ El contenido no es apropiado."); return; }

  let partidos = JSON.parse(localStorage.getItem("partidos") || "[]");
  const yaPublico = partidos.some(p => p.email === usuarioActual.email);
  if(yaPublico){ alert("⚠️ Ya tenés un partido publicado. Eliminalo antes de crear uno nuevo."); return; }

  const horario = fecha + " " + hora;
  const id = Date.now();
  partidos.push({ id, nombre: usuarioActual.nombre, email: usuarioActual.email, zona, horario, anotados: [] });
  localStorage.setItem("partidos", JSON.stringify(partidos));

  mostrar();
  document.getElementById("zona").value = "";
  document.getElementById("fecha").value = "";
  document.getElementById("hora").value = "";
}

function limpiarExpirados(){
  let partidos = JSON.parse(localStorage.getItem("partidos") || "[]");
  const ahora = new Date();
  partidos = partidos.filter(p => new Date(p.horario) > ahora);
  localStorage.setItem("partidos", JSON.stringify(partidos));
}

function anotarse(id){
  let partidos = JSON.parse(localStorage.getItem("partidos") || "[]");
  partidos = partidos.map(p => {
    if(String(p.id) === String(id)){
      const anotados = p.anotados || [];
      if(anotados.includes(usuarioActual.email)){
        p.anotados = anotados.filter(e => e !== usuarioActual.email);
      } else {
        p.anotados = [...anotados, usuarioActual.email];
      }
    }
    return p;
  });
  localStorage.setItem("partidos", JSON.stringify(partidos));
  mostrar();
}

function cerrarModal(){
  document.getElementById("modalEliminar").classList.remove("activo");
}

function eliminarPartido(id){
  const modal = document.getElementById("modalEliminar");
  modal.classList.add("activo");
  document.getElementById("btnConfirmarEliminar").onclick = function(){
    let partidos = JSON.parse(localStorage.getItem("partidos") || "[]");
    partidos = partidos.filter(p => String(p.id) !== String(id));
    localStorage.setItem("partidos", JSON.stringify(partidos));
    cerrarModal();
    mostrar();
  };
}

function mostrar(){
  limpiarExpirados();
  let partidos = JSON.parse(localStorage.getItem("partidos") || "[]");
  const busqueda = document.getElementById("buscar") ? document.getElementById("buscar").value.toLowerCase() : "";
  if(busqueda) partidos = partidos.filter(p => p.zona.toLowerCase().includes(busqueda));

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  if(partidos.length === 0){
    lista.innerHTML = busqueda
      ? "<p style='color:#6b7280; text-align:center;'>No hay partidos en esa zona 🔍</p>"
      : "<p style='color:#6b7280; text-align:center;'>No hay partidos programados 🏃</p>";
    return;
  }

  partidos.forEach(p => {
    const fecha = new Date(p.horario);
    const fechaLinda = fecha.toLocaleDateString("es-AR", {weekday:"long", day:"numeric", month:"long"});
    const horaLinda = fecha.toLocaleTimeString("es-AR", {hour:"2-digit", minute:"2-digit"});
    const anotados = p.anotados || [];
    const yaAnotado = usuarioActual && anotados.includes(usuarioActual.email);
    const esCreador = usuarioActual && p.email === usuarioActual.email;

    const div = document.createElement("div");
    div.className = "partido";

    div.innerHTML = "👤 " + p.nombre + "<br>📍 " + p.zona + "<br>📅 " + fechaLinda + "<br>🕒 " + horaLinda;

    const acciones = document.createElement("div");
    acciones.style = "margin-top:8px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;";

    const contador = document.createElement("span");
    contador.style = "background:#1f2937; padding:4px 10px; border-radius:20px; font-size:0.85rem;";
    contador.textContent = "⚽ " + anotados.length + " jugador" + (anotados.length !== 1 ? "es" : "");
    acciones.appendChild(contador);

    if(!esCreador && usuarioActual){
      const btnAnotar = document.createElement("button");
      btnAnotar.textContent = yaAnotado ? "✓ Anotado" : "+ Anotarme";
      btnAnotar.style.cssText = "background:" + (yaAnotado ? "#6b7280" : "#22c55e") + "; width:auto; padding:5px 12px; font-size:0.85rem; margin:0;";
      btnAnotar.onclick = function(){ anotarse(p.id); };
      acciones.appendChild(btnAnotar);
    }

    if(esCreador){
      const btnEliminar = document.createElement("button");
      btnEliminar.textContent = "🗑 Eliminar";
      btnEliminar.style.cssText = "background:#dc2626; color:white; width:auto; padding:5px 12px; font-size:0.85rem; margin:0;";
      btnEliminar.onclick = function(){ eliminarPartido(p.id); };
      acciones.appendChild(btnEliminar);
    }

    div.appendChild(acciones);
    lista.appendChild(div);
  });
}

// ══════════════════════════════════
//  INICIO: restaurar sesion
// ══════════════════════════════════
const sesionGuardada = localStorage.getItem("sesion");
if(sesionGuardada){
  usuarioActual = JSON.parse(sesionGuardada);
  document.getElementById("badgeNombre").textContent = usuarioActual.nombre;
  mostrarPantalla("pantallaApp");
  mostrar();
}
</script>
